apiVersion: v1
kind: Namespace
metadata:
  name: demo

---
apiVersion: v1
kind: Pod
metadata:
  name: mysql
  namespace: demo
  labels:
    app: mysql
spec:
  containers:
  - name: mysql
    image: mysql:8.0
    env:
    - name: MYSQL_ROOT_PASSWORD
      value: password123
    ports:
    - containerPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: demo
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306