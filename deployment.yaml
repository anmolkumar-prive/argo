apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-demo
  namespace: demo
spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.31
        ports:
        - containerPort: 80

  strategy:
    canary:
      steps:
      - setWeight: 10
      - pause: {duration: 10s}

      - setWeight: 30
      - pause: {duration: 10s}

      - setWeight: 60
      - pause: {duration: 10s}