apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: nginx-demo
  namespace: demo
spec:
  replicas: 5

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80

  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {duration: 30s}

      - setWeight: 50
      - pause: {duration: 30s}

      - setWeight: 100