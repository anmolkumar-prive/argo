apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/anmolkumar-prive/argo.git
    targetRevision: main
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      selfHeal: true